# Netlify config — proyecto dcycle-mkt-gtm-revenue-tracking-tool (team Dcycle, Pro)
# Site ID: 170e45ec-0ac4-4b40-a067-0f1a0d995ff3
# Despliegue continuo GitHub → Netlify: ver docs/CONEXIONES.md §0.
# El runtime de Next.js de Netlify detecta el framework automáticamente.

[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  # Node 22 (afecta a build + runtime de Functions). 22 trae WebSocket nativo,
  # que necesita @supabase/supabase-js v2 para no romper al instanciar el
  # cliente. Si bajas a <22 hay que añadir el paquete `ws` y pasarlo como
  # transport (Supabase no expone esa opción públicamente).
  NODE_VERSION = "22"

# Scheduled Functions: jobs de ingesta (PRD §5). El schedule lo declara cada
# función en su propio `config.schedule`; aquí solo fijamos la carpeta y el
# runtime Node 22 (consistente con el build).
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  node_version = "22"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Deploy de ramas: cada branch deploy obtiene su propia URL
# (p.ej. claude-beautiful-babbage-ugrg1y--dcycle-mkt-gtm-revenue-tracking-tool.netlify.app)
# para que el equipo de Ops revise sin tocar `main`.
[context.branch-deploy]
  command = "npm run build"

[context.deploy-preview]
  command = "npm run build"
